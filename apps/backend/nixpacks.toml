[phases.setup]
nixPkgs = ["python311", "postgresql"]
aptPkgs = []

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "gunicorn keja_backend.wsgi --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60"

[variables]
NIXPACKS_NO_MUSL = "1"
