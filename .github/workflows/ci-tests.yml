name: CI Tests

on:
  pull_request:
    branches:
      - main
      - staging
      - dev
  push:
    branches:
      - dev

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: keja/apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: keja/apps/frontend
        run: npm ci

      - name: Run linter
        working-directory: keja/apps/frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: keja/apps/frontend
        run: npm test -- --passWithNoTests --coverage

      - name: Build check
        working-directory: keja/apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_PUBLIC_ENVIRONMENT: development
        run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: keja/apps/backend/requirements.txt

      - name: Install dependencies
        working-directory: keja/apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: keja/apps/backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py check

      - name: Check migrations
        working-directory: keja/apps/backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        working-directory: keja/apps/backend
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py test --verbosity=2

      - name: Check for security issues
        working-directory: keja/apps/backend
        run: |
          pip install safety
          safety check || true
