name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'keja/apps/frontend/**'
      - '.github/workflows/deploy-frontend-production.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: keja/apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: keja/apps/frontend
        run: npm ci

      - name: Run tests
        working-directory: keja/apps/frontend
        run: npm test -- --passWithNoTests

      - name: Build application
        working-directory: keja/apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          NEXT_PUBLIC_ENVIRONMENT: production
          NEXT_PUBLIC_SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: keja/apps/frontend
          vercel-args: '--prod'

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Frontend deployed to production successfully!"
          echo "URL: ${{ secrets.PRODUCTION_SITE_URL }}"
