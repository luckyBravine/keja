name: Deploy Backend to Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'keja/apps/backend/**'
      - '.github/workflows/deploy-backend-staging.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: keja/apps/backend/requirements.txt

      - name: Install dependencies
        working-directory: keja/apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        working-directory: keja/apps/backend
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: 'False'
        run: python manage.py check

      - name: Run tests
        working-directory: keja/apps/backend
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: 'False'
        run: python manage.py test --verbosity=2

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway (Staging)
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          service: ${{ secrets.RAILWAY_SERVICE_ID_STAGING }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Backend deployed to staging successfully!"
          echo "API URL: ${{ secrets.STAGING_API_URL }}"
